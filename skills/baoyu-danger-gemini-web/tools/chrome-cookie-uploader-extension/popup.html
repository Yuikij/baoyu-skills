<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gemini Cookie Uploader</title>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      box-sizing: border-box;
    }
    h3 { margin-top: 0; margin-bottom: 15px; }
    .group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 13px; }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .toggle-label {
      margin: 0;
      font-weight: 500;
      font-size: 13px;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background-color: #0056b3; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    #status {
      margin-top: 15px;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }
    .success { color: #28a745; }
    .error { color: #dc3545; }
    .info { color: #17a2b8; }
  </style>
</head>
<body>
  <h3>Sync Gemini Cookies</h3>
  
  <div class="group">
    <label for="serverUrl">Receiver Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:3000/upload" value="http://localhost:3000/upload" />
  </div>

  <div class="group toggle-row">
    <label class="toggle-label" for="autoSync">Cookie changed -> auto sync</label>
    <input type="checkbox" id="autoSync" checked />
  </div>

  <button id="syncBtn">Upload Cookies</button>
  
  <div id="status"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
